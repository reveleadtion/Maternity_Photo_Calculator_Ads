<!-- TWO WILD SOULS — MATERNITY POPUP v4
     Changes from v3:
     - Inline quiz REPLACED with iframe embed of moments.twowildsoulsphotography.com
     - Popup opens with a branded intro screen first
     - "Start" button loads the iframe (lazy — avoids loading until needed)
     - Listens for window.postMessage from the moments page on quiz completion
       Expected message format: { type: 'TWS_QUIZ_COMPLETE', url: '<results url>' }
     - On receiving the message → window.location.href = url (full tab navigation)
     - Fallback: if iframe navigation is detected going to the results page domain,
       the parent also follows (catches cases where postMessage isn't available yet)
     - All timer / suppress / ribbon / flag logic identical to v3
     - TEST_MODE = true  → fires instantly, skips suppression
     - TEST_MODE = false → 2 min delay, 7-day suppress (GO LIVE)

     MANUAL TRIGGER:
     - Set any Showit button URL to: javascript:twsOpen()
-->

function isDismissed(){
  if(TEST_MODE) return false;
  try{ var v = localStorage.getItem(DISMISS_KEY); return !!(v && (Date.now()-parseInt(v)) < SUPPRESS_MS); }catch(e){ return false; }
}
function setDismissed(){ try{ localStorage.setItem(DISMISS_KEY, Date.now().toString()); }catch(e){} }
function setFlag(){ try{ localStorage.setItem(FLAG_KEY,'1'); }catch(e){} }
function isFlagged(){ try{ return localStorage.getItem(FLAG_KEY)==='1'; }catch(e){ return false; } }
function getTimerStart(){ try{ var v=localStorage.getItem(TIMER_KEY); return v?parseInt(v):null; }catch(e){ return null; } }
function setTimerStart(){ try{ if(!localStorage.getItem(TIMER_KEY)) localStorage.setItem(TIMER_KEY,Date.now().toString()); }catch(e){} }
function clearTimer(){ try{ localStorage.removeItem(TIMER_KEY); }catch(e){} }
function setRibbonActive(){ try{ sessionStorage.setItem(RIBBON_KEY,'1'); }catch(e){} }
function clearRibbonActive(){ try{ sessionStorage.removeItem(RIBBON_KEY); }catch(e){} }
function isRibbonActive(){ try{ return sessionStorage.getItem(RIBBON_KEY)==='1'; }catch(e){ return false; } }
function timeElapsed(){ var s=getTimerStart(); return s?Date.now()-s:0; }
function isExcludedPage(){
  var u=window.location.href.toLowerCase();
  for(var i=0;i<EXCLUDED.length;i++){ if(u.indexOf('/'+EXCLUDED[i])!==-1) return true; }

/* ── Launch quiz (swap intro → iframe) ── */
window.twsLaunchQuiz = function(){
  var intro = document.getElementById('twsIntro');
  var view  = document.getElementById('twsIframeView');
  var frame = document.getElementById('twsQuizFrame');
  var card  = document.getElementById('twsCard');
  if(!intro || !view || !frame) return;

  /* Only set src once */
  if(!iframeLoaded){
    /* Pass fbclid/gclid through so analytics still work */
    var urlParams = new URLSearchParams(window.location.search);
    var quizSrc   = QUIZ_URL;
    var extras    = [];
    if(urlParams.get('fbclid')) extras.push('fbclid='+encodeURIComponent(urlParams.get('fbclid')));
    if(urlParams.get('gclid'))  extras.push('gclid='+encodeURIComponent(urlParams.get('gclid')));
    if(extras.length) quizSrc += (quizSrc.indexOf('?') === -1 ? '?' : '&') + extras.join('&');
    frame.src = quizSrc;
    iframeLoaded = true;
  }

  /* Expand card to accommodate the quiz height */
  card.style.maxWidth  = '560px';
  card.style.maxHeight = '92vh';

  /* Animate swap */
  intro.style.transition = 'opacity 0.2s ease';
  intro.style.opacity    = '0';
  setTimeout(function(){
    intro.style.display = 'none';
    view.classList.add('active');
  }, 200);
};

/* ── Show / Dismiss / Ribbon ── */
function twsShow(){ var p=document.getElementById('twsPop'); if(p) p.classList.add('open'); }

window.twsDismiss = function(){
  var p=document.getElementById('twsPop');
  if(p){
    p.style.transition='opacity 0.2s ease'; p.style.opacity='0';
    setTimeout(function(){ p.classList.remove('open'); p.style.opacity=''; p.style.transition=''; showRibbon(); }, 200);
  }
  setDismissed(); clearTimer();
};

function showRibbon(){
  if(isExcludedPage()) return;
  setRibbonActive();
  var el=document.getElementById('twsRibbon');
  if(!el){ injectRibbon(); el=document.getElementById('twsRibbon'); }
  if(!el) return;
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('visible'); }); });
}
function hideRibbon(){ var r=document.getElementById('twsRibbon'); if(r) r.classList.remove('visible'); }
function injectRibbon(){
  if(document.getElementById('twsRibbon')) return;
  var el=document.createElement('div'); el.id='twsRibbon';
  el.innerHTML='<button onclick="twsRibbonOpen()" aria-label="Reopen timing calculator">Get Maternity Quote...</button>';
  document.body.appendChild(el);
}

  var intro = document.getElementById('twsIntro');
  var view  = document.getElementById('twsIframeView');
  var frame = document.getElementById('twsQuizFrame');
  var card  = document.getElementById('twsCard');
  if(intro){ intro.style.display=''; intro.style.opacity='1'; }
  if(view)  view.classList.remove('active');
  if(frame){ frame.src=''; }
  if(card){ card.style.maxWidth=''; card.style.maxHeight=''; }
  /* Restore loading shimmer */
  var ldr=document.getElementById('twsFrameLoading'); if(ldr) ldr.classList.remove('hidden');
}

window.twsOpen = function(){
  try{ localStorage.removeItem(DISMISS_KEY); }catch(e){}
  hideRibbon(); clearRibbonActive();
  if(!document.getElementById('twsPop')){ injectStyles(); injectHTML(); }
  else twsReset();
  twsShow();
};

window.twsRibbonOpen = function(){
  hideRibbon(); clearRibbonActive();
  try{ localStorage.removeItem(DISMISS_KEY); }catch(e){}
  if(!document.getElementById('twsPop')){ injectStyles(); injectHTML(); }
  else twsReset();
  twsShow();
};

/* ── Core init ── */
function tryInit(){
  var log=function(m){ console.log('[TWS Popup v4] '+m); };

  if(isRibbonActive()){
    if(isExcludedPage()){ log('Excluded — ribbon suppressed'); return; }
    log('Ribbon active — restoring tab');
    injectStyles(); injectRibbon(); showRibbon(); return;
  }

  if(isDismissed()){ log('Suppressed — dismissed within 7 days'); return; }
  if(isExcludedPage()){ log('Excluded page — popup blocked'); return; }

  if(isQualifyingMaternityPage()){ log('Qualifying page — flagging'); setFlag(); setTimerStart(); }
  else { log('Not a qualifying page'); }

  if(!isFlagged()){ log('Not flagged yet'); return; }

  var elapsed   = timeElapsed();
  var remaining = TEST_MODE ? 0 : Math.max(0, DELAY_MS - elapsed);
  log('Elapsed: '+Math.round(elapsed/1000)+'s, remaining: '+Math.round(remaining/1000)+'s');

  if(remaining === 0){
    log('Firing popup now');
    if(!document.getElementById('twsPop')){ injectStyles(); injectHTML(); }
    twsShow();
  } else {
    log('Scheduled in '+Math.round(remaining/1000)+'s');
    setTimeout(function(){
      if(isDismissed()){ log('Cancelled — dismissed during wait'); return; }
      if(isExcludedPage()){ log('Cancelled — excluded page'); return; }
      if(!document.getElementById('twsPop')){ injectStyles(); injectHTML(); }
      twsShow();
    }, remaining);
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', tryInit);
} else { tryInit(); }

window.addEventListener('popstate', tryInit);
window.addEventListener('hashchange', tryInit);

})();
</script>

<script>
const DEBUG = window.location.search.includes('debug=1');

const MATERNITY_URL = 'https://twowildsoulsphotography.com/personalized-maternity-results';
const NEWBORN_URL   = 'https://twowildsoulsphotography.com/detroit-newborn-photographer-ads';

// ── BLACKOUT WINDOW ──────────────────────────────────────────────────────────
// Lead photographer on leave June 1 – July 31, 2026.
// Last available session: May 31, 2026. Back: August 1, 2026.
const BLACKOUT_START = new Date('2026-06-01T00:00:00');
const BLACKOUT_END   = new Date('2026-07-31T23:59:59');

function isMaternityBlackout(dueDateStr) {
  // Check if the maternity session window (weeks 28–32) overlaps with blackout
  const due = new Date(dueDateStr + 'T12:00:00');
  const conception = new Date(due.getTime() - 280 * 86400000);
  const week28 = new Date(conception.getTime() + 28 * 7 * 86400000);
  const week32 = new Date(conception.getTime() + 32 * 7 * 86400000);
  return week28 < BLACKOUT_END && week32 > BLACKOUT_START;
}

function isNewbornBlackout(dueDateStr) {
  // Check if newborn session window (birth + 5–14 days) overlaps with blackout
  const due = new Date(dueDateStr + 'T12:00:00');
  const nb5  = new Date(due.getTime() + 5  * 86400000);
  const nb14 = new Date(due.getTime() + 14 * 86400000);
  return nb5 < BLACKOUT_END && nb14 > BLACKOUT_START;
}

function getBlackoutType(dueDateStr, isLateRoute) {
  if (isLateRoute) return isNewbornBlackout(dueDateStr) ? 'newborn' : null;
  return isMaternityBlackout(dueDateStr) ? 'maternity' : null;
}

function buildBlackoutURLs(quizData, isLateRoute) {
  const incomingParams = new URLSearchParams(window.location.search);
  const fbclid = incomingParams.get('fbclid');
  const gclid  = incomingParams.get('gclid');
  const dest = isLateRoute ? NEWBORN_URL : MATERNITY_URL;

  /*
   * For each option we synthesize a due date that puts the ideal session
   * window in the target month, so the landing page calculates correctly.
   *
   * Maternity: session at week 30 (midpoint of 28–32 window)
   *   due date = target session date + (40 - 30) * 7 days = target + 70 days
   *
   * Newborn: birth (due date) = target newborn session date - 7 days (midpoint of 5–14)
   *
   * May target:    May 15, 2026
   * August target: August 15, 2026
   */
  function syntheticDueDate(targetDateStr, isNewborn) {
    const target = new Date(targetDateStr + 'T12:00:00');
    const MS = 86400000;
    if (isNewborn) {
      // due date ≈ 7 days before newborn session midpoint
      const due = new Date(target.getTime() - 7 * MS);
      return due.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    } else {
      // due date = session date + 70 days (week 30 → due date)
      const due = new Date(target.getTime() + 70 * MS);
      return due.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
  }

  function makeURL(note, targetDate) {
    const synDue = syntheticDueDate(targetDate, isLateRoute);
    const d = Object.assign({}, quizData, {
      blackout_note: note,
      duedate: synDue,
      // Strip week/status so landing page recalculates from the synthetic due date
      week:   undefined,
      status: undefined
    });
    // Clean up undefined keys
    Object.keys(d).forEach(function(k) { if (d[k] === undefined) delete d[k]; });
    const p = new URLSearchParams({ d: encodeQuizData(d) });
    if (fbclid) p.append('fbclid', fbclid);
    if (gclid)  p.append('gclid', gclid);
    return dest + '?' + p.toString();
  }

  return {
    may:    makeURL('book_may',    '2026-05-15'),
    august: makeURL('book_august', '2026-08-15')
  };
}

function emitVercelFlags(flags) {
  let meta = document.querySelector('meta[name="vercel-flag-values"]');
  if (!meta) { meta = document.createElement('meta'); meta.name = 'vercel-flag-values'; document.head.appendChild(meta); }
  meta.content = JSON.stringify(flags);
}
function encodeQuizData(data) { return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); }
function todayPlus(days) { const d = new Date(); d.setDate(d.getDate() + days); return d.toISOString().split('T')[0]; }
function formatDateStr(str) { return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); }
function currentPregnancyWeek(dueDateStr) {
  const due = new Date(dueDateStr + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const conception = new Date(due.getTime() - 280 * 86400000);
  const daysSince = Math.floor((today - conception) / 86400000);
  return Math.max(1, Math.min(42, Math.ceil(daysSince / 7)));
}

function calculate() {
  const isFirst   = state.firstBaby === 'yes';
  const multiples = state.multiples === 'yes';
  const style     = state.style || 'full';
  const setting   = state.whoJoins === 'momOnly' ? 'indoor' : (state.whoJoins ? 'both' : 'both');
  const week      = currentPregnancyWeek(state.dueDate);

  let startWeek, endWeek;
  if (multiples) { startWeek = 24; endWeek = 28; }
  else if (!isFirst) { startWeek = style === 'full' ? 28 : 26; endWeek = style === 'full' ? 32 : 30; }
  else { startWeek = style === 'full' ? 30 : 28; endWeek = style === 'full' ? 34 : 32; }
  if (!multiples) {
    if (setting === 'outdoor')     { startWeek = Math.max(20, startWeek - 2); endWeek = Math.max(22, endWeek - 2); }
    else if (setting === 'indoor') { startWeek = Math.min(32, startWeek + 1); endWeek = Math.min(34, endWeek + 1); }
  }
  endWeek   = Math.min(endWeek, 32);
  startWeek = Math.min(startWeek, 32);

  const isLate     = week >= 33;
  const isUrgent   = week === 32;
  const isInWindow = week >= startWeek && week <= endWeek && !isUrgent && !isLate;

  let context = 'early';
  if (isLate || isUrgent)  context = 'late';
  else if (isInWindow)     context = 'inWindow';
  else if (week > endWeek) context = 'pastWindow';

  let bookByStr = '';
  if (!isLate && !isUrgent) {
    const due        = new Date(state.dueDate + 'T12:00:00');
    const conception = new Date(due.getTime() - 280 * 86400000);
    const bookDate   = new Date(conception);
    bookDate.setDate(bookDate.getDate() + startWeek * 7 - 42);
    bookByStr = bookDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  } else if (isUrgent) { bookByStr = 'Today'; }

  const pkgKey = state.whoJoins === 'momOnly' ? 'portraits' : 'whiteGlove';
  const dest   = isLate ? NEWBORN_URL : MATERNITY_URL;

//3/17/26 - Remove status and week:
const quizData = {
  window:  (isLate || isUrgent) ? '' : (startWeek + '-' + endWeek),
  bookby:  bookByStr,
  type:    isLate ? 'newborn' : 'maternity',
  style,
  setting,
  package: pkgKey,
  duedate: formatDateStr(state.dueDate)
  // week and status intentionally omitted — embed calculates live
};

  const incomingParams = new URLSearchParams(window.location.search);
  const fbclid = incomingParams.get('fbclid');
  const gclid  = incomingParams.get('gclid');
  const finalParams = new URLSearchParams({ d: encodeQuizData(quizData) });
  if (fbclid) finalParams.append('fbclid', fbclid);
  if (gclid)  finalParams.append('gclid', gclid);

  try { fbq('track', 'Lead', { content_name: 'Calculator Complete', content_category: context, value: week, currency: 'USD' }); } catch(e) {}

  return { dest, finalParams, pkgKey, quizData, isLate };
}

  else { if (warn) warn.classList.remove('show'); btn.textContent = currentStep === TOTAL - 1 ? 'See My Results \u2192' : 'Continue \u2192'; }
  if (msg) msg.style.display = 'none';
  emitVercelFlags({ 'quiz-step': String(currentStep + 1), 'quiz-step-name': 'dueDate', 'quiz-pct': String(Math.round(((currentStep + 1) / TOTAL) * 100)), 'quiz-week': String(week) });
}
function selectOpt(id, value, el) {
  state[id] = value;
  document.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('btnNext').disabled = false;
  setTimeout(function() { goNext(); }, 280);
}
function goNext() {
  var step = STEPS[currentStep];
  var msg  = document.getElementById('valMsg');
  if (step && step.type === 'date') {
    var val = document.getElementById('dateInput') ? document.getElementById('dateInput').value : '';
    if (!val) { if (msg) { msg.style.display = 'block'; msg.textContent = 'Please select your due date.'; } return; }
    state.dueDate = val;
    if (currentPregnancyWeek(val) >= 33) { currentStep = TOTAL; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  }
  if (step && step.type === 'options' && !state[step.id]) { if (msg) { msg.style.display = 'block'; msg.textContent = 'Please make a selection.'; } return; }
  currentStep++; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goBack() {
  if (currentStep > 0) { currentStep--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else { currentStep = -1; render(); }
}

render();

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden' && currentStep > -1 && currentStep < TOTAL) {
    try { fbq('trackCustom', 'QuizAbandoned', { step_reached: currentStep + 1, step_name: STEPS[currentStep] ? STEPS[currentStep].id : 'unknown' }); } catch(e) {}
  }
});
</script>
</body>
